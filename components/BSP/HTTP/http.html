<!--
  ESP32 HTTP Server API 约定 (需在C端实现):

    POST /api/start
      → 调用 motor_coordinated_control(void)
      → 返回: {"status":"ok","state":"kneading"}
      → 建议: 在FreeRTOS任务中执行电机控制，HTTP handler立即返回

    GET /api/status
      → 返回电机当前状态
      → {"state":"idle"|"kneading"|"fermenting"|"done"|"error"}
      → motor_coordinated_control() 执行中返回 "kneading"
      → 执行完毕后返回 "fermenting" 或 "done"

    POST /api/stop
      → 调用 motor_emergency_stop(void)
      → 返回: {"status":"ok","state":"idle"}
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f0eb">
    <title>和面机控制面板</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text-primary: #3d3226;
            --text-secondary: #8b7b6b;
            --idle-color: #9ca3af;
            --kneading-color: #f59e0b;
            --kneading-glow: #fbbf24;
            --fermenting-color: #10b981;
            --fermenting-glow: #6ee7b7;
            --danger-color: #ef4444;
            --danger-dark: #b91c1c;
            --danger-glow: #fca5a5;
            --start-color: #f59e0b;
            --start-dark: #d97706;
            --start-glow: #fcd34d;
            --ring-bg: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.18);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(245, 158, 11, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(139, 92, 46, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 主容器 */
        .main-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 4px;
        }
        .header .icon-row {
            font-size: 36px;
            margin-bottom: 4px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }
        .header .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 24px 20px 28px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            position: relative;
            overflow: visible;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: box-shadow var(--transition-smooth), border-color var(--transition-smooth);
        }

        .card.state-kneading {
            border-color: rgba(245, 158, 11, 0.2);
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(245, 158, 11, 0.08), 0 0 60px rgba(245, 158, 11, 0.08);
        }

        .card.state-fermenting {
            border-color: rgba(16, 185, 129, 0.2);
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(16, 185, 129, 0.08), 0 0 60px rgba(16, 185, 129, 0.06);
        }

        .card.state-idle {
            border-color: rgba(0, 0, 0, 0.04);
            box-shadow: var(--shadow-lg);
        }

        /* 步骤指示器 */
        .steps-row {
            display: flex;
            align-items: center;
            gap: 0;
            width: 100%;
            max-width: 280px;
            justify-content: center;
            padding: 0 10px;
        }
        .step-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e5e7eb;
            transition: all var(--transition-smooth);
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .step-dot.active-kneading {
            background: var(--kneading-color);
            box-shadow: 0 0 14px var(--kneading-glow), 0 0 28px rgba(245, 158, 11, 0.35);
            animation: dotPulse 1.2s ease-in-out infinite;
            transform: scale(1.2);
        }
        .step-dot.active-fermenting {
            background: var(--fermenting-color);
            box-shadow: 0 0 14px var(--fermenting-glow), 0 0 28px rgba(16, 185, 129, 0.35);
            animation: dotPulse 2s ease-in-out infinite;
            transform: scale(1.2);
        }
        .step-dot.done {
            background: #d1d5db;
            box-shadow: none;
            transform: scale(0.9);
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
            }
            50% {
                box-shadow: 0 0 22px currentColor, 0 0 40px currentColor;
            }
        }
        .step-line {
            width: 32px;
            height: 3px;
            border-radius: 2px;
            background: #e5e7eb;
            flex-shrink: 0;
            transition: all var(--transition-smooth);
            z-index: 1;
        }
        .step-line.active-line {
            background: var(--kneading-color);
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
        }
        .step-line.fermenting-line {
            background: var(--fermenting-color);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
        }
        .step-label-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 280px;
            padding: 0 2px;
            margin-top: -14px;
        }
        .step-label {
            font-size: 0.65rem;
            color: #c5c0b8;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: color var(--transition-smooth);
            text-align: center;
            width: 40px;
            flex-shrink: 0;
        }
        .step-label.label-active {
            color: var(--text-primary);
            font-weight: 700;
        }
        .step-label.label-fermenting-active {
            color: #065f46;
            font-weight: 700;
        }

        /* 圆形指示器容器 */
        .indicator-wrapper {
            position: relative;
            width: clamp(170px, 48vw, 220px);
            height: clamp(170px, 48vw, 220px);
            flex-shrink: 0;
        }
        .indicator-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        /* 背景环 */
        .ring-bg {
            fill: none;
            stroke: #e9e5e0;
            stroke-width: 10;
            transition: stroke var(--transition-smooth);
        }
        /* 进度环 */
        .ring-progress {
            fill: none;
            stroke: var(--idle-color);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 565;
            /* 2*PI*90 ≈ 565 */
            stroke-dashoffset: 0;
            transition: stroke var(--transition-smooth), stroke-dashoffset 0.6s ease;
            transform-origin: center;
        }
        .ring-progress.spinning {
            animation: ringSpin 1.5s linear infinite;
        }
        .ring-progress.pulsing {
            animation: ringPulse 2.5s ease-in-out infinite;
        }
        @keyframes ringSpin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes ringPulse {
            0%,
            100% {
                stroke-width: 10;
                opacity: 0.7;
            }
            50% {
                stroke-width: 14;
                opacity: 1;
            }
        }

        /* 圆形内部内容 */
        .indicator-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            z-index: 5;
        }
        .indicator-icon {
            font-size: 2.4rem;
            transition: all var(--transition-bounce);
            line-height: 1;
        }
        .indicator-state-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            transition: color var(--transition-smooth);
        }
        .indicator-timer {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.02em;
            transition: color var(--transition-smooth);
            min-width: 70px;
            text-align: center;
        }
        .indicator-timer.idle-timer {
            color: #c5c0b8;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.06em;
        }

        /* 状态标签徽章 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition-smooth);
        }
        .status-badge.idle-badge {
            background: #f3f4f6;
            color: #6b7280;
        }
        .status-badge.kneading-badge {
            background: #fffbeb;
            color: #b45309;
            animation: badgeGlow 1.2s ease-in-out infinite;
        }
        .status-badge.fermenting-badge {
            background: #ecfdf5;
            color: #065f46;
            animation: badgeGlow 2s ease-in-out infinite;
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.3);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(245, 158, 11, 0);
            }
        }

        /* 按钮区域 */
        .buttons-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 4px;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }
        .btn:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .btn:active::after {
            opacity: 1;
        }

        /* 开始和面按钮 */
        .btn-start {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 30%, #d97706 100%);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.35), 0 2px 6px rgba(217, 119, 6, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-start::after {
            background: rgba(0, 0, 0, 0.12);
        }
        .btn-start:active {
            box-shadow: 0 3px 10px rgba(245, 158, 11, 0.4), 0 1px 3px rgba(217, 119, 6, 0.3);
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
        }
        .btn-start:disabled {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            color: #9ca3af;
            text-shadow: none;
            cursor: not-allowed;
            border: 2px solid rgba(0, 0, 0, 0.03);
            letter-spacing: 0.05em;
        }
        .btn-start:disabled:active {
            transform: none;
        }
        .btn-start .btn-icon {
            font-size: 1.3rem;
            transition: transform var(--transition-smooth);
        }
        .btn-start:not(:disabled):hover .btn-icon {
            transform: rotate(-15deg);
        }

        /* 紧急停止按钮 */
        .btn-stop {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 20%, #dc2626 60%, #b91c1c 100%);
            box-shadow: 0 8px 28px rgba(239, 68, 68, 0.4), 0 3px 8px rgba(185, 28, 28, 0.3), 0 0 0 4px rgba(239, 68, 68, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.25);
            height: 64px;
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            animation: stopPulse 2.5s ease-in-out infinite;
            border-radius: var(--radius-lg);
        }
        @keyframes stopPulse {
            0%,
            100% {
                box-shadow: 0 8px 28px rgba(239, 68, 68, 0.4), 0 3px 8px rgba(185, 28, 28, 0.3), 0 0 0 4px rgba(239, 68, 68, 0.08);
            }
            50% {
                box-shadow: 0 8px 32px rgba(239, 68, 68, 0.55), 0 3px 10px rgba(185, 28, 28, 0.4), 0 0 0 12px rgba(239, 68, 68, 0);
            }
        }
        .btn-stop::after {
            background: rgba(0, 0, 0, 0.15);
        }
        .btn-stop:active {
            box-shadow: 0 3px 14px rgba(239, 68, 68, 0.5), 0 1px 4px rgba(185, 28, 28, 0.4), 0 0 0 2px rgba(239, 68, 68, 0.15);
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 50%, #7f1d1d 100%);
            transform: scale(0.95);
        }
        .btn-stop:disabled {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            color: #9ca3af;
            text-shadow: none;
            cursor: not-allowed;
            border: 2px solid rgba(0, 0, 0, 0.03);
            animation: none;
            letter-spacing: 0.05em;
        }
        .btn-stop:disabled:active {
            transform: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .btn-stop .btn-icon {
            font-size: 1.4rem;
            transition: transform var(--transition-smooth);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1f2937;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.warning-toast {
            background: #ef4444;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        }

        /* 响应式微调 */
        @media (max-width: 360px) {
            .card {
                padding: 18px 14px 22px;
                gap: 16px;
                border-radius: var(--radius-lg);
            }
            .btn {
                height: 48px;
                font-size: 0.95rem;
                border-radius: var(--radius-md);
            }
            .btn-stop {
                height: 56px;
                font-size: 1rem;
                border-radius: var(--radius-md);
            }
            .indicator-wrapper {
                width: clamp(140px, 42vw, 170px);
                height: clamp(140px, 42vw, 170px);
            }
            .indicator-icon {
                font-size: 1.8rem;
            }
            .indicator-timer {
                font-size: 1.3rem;
            }
            .step-line {
                width: 22px;
            }
            .step-label {
                font-size: 0.58rem;
                width: 32px;
            }
        }
        @media (min-width: 420px) {
            .btn {
                height: 60px;
                font-size: 1.1rem;
            }
            .btn-stop {
                height: 70px;
                font-size: 1.15rem;
            }
            .indicator-wrapper {
                width: 220px;
                height: 220px;
            }
            .indicator-icon {
                font-size: 2.8rem;
            }
            .indicator-timer {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 头部 -->
        <div class="header">
            <span class="icon-row">🍞</span>
            <h1>和面机控制面板</h1>
            <p class="subtitle">Dough Mixer · 智能掌控</p>
        </div>

        <!-- 卡片 -->
        <div class="card state-idle" id="mainCard">
            <!-- 步骤指示器 -->
            <div class="steps-row" id="stepsRow">
                <div class="step-dot" id="stepDot1"></div>
                <div class="step-line" id="stepLine1"></div>
                <div class="step-dot" id="stepDot2"></div>
                <div class="step-line" id="stepLine2"></div>
                <div class="step-dot" id="stepDot3"></div>
            </div>
            <div class="step-label-row">
                <span class="step-label" id="stepLabel1">和面</span>
                <span class="step-label" id="stepLabel2">发酵</span>
                <span class="step-label" id="stepLabel3">完成</span>
            </div>

            <!-- 圆形指示器 -->
            <div class="indicator-wrapper">
                <svg class="indicator-svg" viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="90"/>
                    <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"
                    stroke-dasharray="565" stroke-dashoffset="0"/>
                </svg>
                <div class="indicator-inner">
                    <span class="indicator-icon" id="indicatorIcon">💤</span>
                    <span class="indicator-state-text" id="indicatorStateText">空闲中</span>
                    <span class="indicator-timer idle-timer" id="indicatorTimer">--:--</span>
                </div>
            </div>

            <!-- 状态徽章 -->
            <span class="status-badge idle-badge" id="statusBadge">● 空闲中</span>

            <!-- 按钮区域 -->
            <div class="buttons-area">
                <button class="btn btn-start" id="btnStart" aria-label="开始和面">
                    <span class="btn-icon">🥖</span> 开始和面
                </button>
                <button class="btn btn-stop" id="btnStop" disabled aria-label="紧急停止">
                    <span class="btn-icon">⏹</span> 紧急停止
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const mainCard = document.getElementById('mainCard');
            const ringProgress = document.getElementById('ringProgress');
            const indicatorIcon = document.getElementById('indicatorIcon');
            const indicatorStateText = document.getElementById('indicatorStateText');
            const indicatorTimer = document.getElementById('indicatorTimer');
            const statusBadge = document.getElementById('statusBadge');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const toast = document.getElementById('toast');

            // 步骤元素
            const stepDot1 = document.getElementById('stepDot1');
            const stepDot2 = document.getElementById('stepDot2');
            const stepDot3 = document.getElementById('stepDot3');
            const stepLine1 = document.getElementById('stepLine1');
            const stepLine2 = document.getElementById('stepLine2');
            const stepLabel1 = document.getElementById('stepLabel1');
            const stepLabel2 = document.getElementById('stepLabel2');
            const stepLabel3 = document.getElementById('stepLabel3');

            // ============ 状态管理 ============
            const FERMENTING_DURATION = 600; // 发酵时长10分钟

            let currentState = 'idle'; // 'idle' | 'kneading' | 'fermenting'
            let elapsedSeconds = 0;
            let timerInterval = null;
            let stateTimeout = null;
            let currentTotalDuration = 0;
            let pollingInterval = null;

            // ============ 音效 ============
            function playBeep(frequency, duration, type = 'sine') {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + duration);
                    // 清理
                    setTimeout(() => {
                        try { ctx.close(); } catch (e) { /* ignore */ }
                    }, duration + 200);
                } catch (e) {
                    // 静默处理不支持的情况
                }
            }

            function soundStateChange() {
                playBeep(800, 0.12, 'sine');
                setTimeout(() => playBeep(600, 0.1, 'sine'), 100);
            }

            function soundStop() {
                playBeep(200, 0.35, 'square');
            }

            function soundComplete() {
                playBeep(1000, 0.1, 'sine');
                setTimeout(() => playBeep(1200, 0.1, 'sine'), 120);
                setTimeout(() => playBeep(1400, 0.18, 'sine'), 240);
            }

            // ============ Toast ============
            let toastTimeout = null;

            function showToast(message, isWarning = false) {
                if (toastTimeout) clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.className = 'toast' + (isWarning ? ' warning-toast' : '');
                // 强制回流后添加show类
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimeout = null;
                }, 1800);
            }

            // ============ 触觉反馈 ============
            function vibrate(pattern) {
                try {
                    if (navigator.vibrate) {
                        navigator.vibrate(pattern);
                    }
                } catch (e) {
                    // 静默处理
                }
            }

            // ============ API通信 ============
            async function apiCall(endpoint, method = 'GET') {
                const res = await fetch(endpoint, { method });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            }

            function startPolling() {
                if (pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(async () => {
                    try {
                        const data = await apiCall('/api/status');
                        if (data.state === 'fermenting' || data.state === 'done') {
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            startFermenting();
                        } else if (data.state === 'idle' || data.state === 'error') {
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            if (data.state === 'error') showToast('⚠ 运行异常', true);
                            resetToIdle();
                        }
                    } catch (e) {
                        // 网络错误，继续轮询
                    }
                }, 1000);
            }

            function stopPolling() {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                }
            }

            // ============ UI更新 ============
            function updateUI() {
                // 重置所有类
                ringProgress.classList.remove('spinning', 'pulsing');
                mainCard.classList.remove('state-idle', 'state-kneading', 'state-fermenting');
                statusBadge.classList.remove('idle-badge', 'kneading-badge', 'fermenting-badge');
                indicatorTimer.classList.remove('idle-timer');

                // 重置步骤
                [stepDot1, stepDot2, stepDot3].forEach(d => {
                    d.classList.remove('active-kneading', 'active-fermenting', 'done');
                });
                [stepLine1, stepLine2].forEach(l => {
                    l.classList.remove('active-line', 'fermenting-line');
                });
                [stepLabel1, stepLabel2, stepLabel3].forEach(l => {
                    l.classList.remove('label-active', 'label-fermenting-active');
                });

                switch (currentState) {
                    case 'idle':
                        mainCard.classList.add('state-idle');
                        statusBadge.classList.add('idle-badge');
                        statusBadge.textContent = '● 空闲中';
                        ringProgress.style.stroke = '#9ca3af';
                        ringProgress.style.strokeDashoffset = '0';
                        indicatorIcon.textContent = '💤';
                        indicatorStateText.textContent = '空闲中';
                        indicatorTimer.textContent = '--:--';
                        indicatorTimer.classList.add('idle-timer');
                        btnStart.disabled = false;
                        btnStart.innerHTML = '<span class="btn-icon">🥖</span> 开始和面';
                        btnStop.disabled = true;
                        // 步骤全灰
                        [stepDot1, stepDot2, stepDot3].forEach(d => d.classList.add('done'));
                        [stepLabel1, stepLabel2, stepLabel3].forEach(l => l.classList.remove('label-active',
                            'label-fermenting-active'));
                        break;

                    case 'kneading':
                        mainCard.classList.add('state-kneading');
                        statusBadge.classList.add('kneading-badge');
                        statusBadge.textContent = '⟳ 和面中';
                        ringProgress.style.stroke = '#f59e0b';
                        ringProgress.style.strokeDashoffset = '0';
                        ringProgress.classList.add('spinning');
                        indicatorIcon.textContent = '🔄';
                        indicatorStateText.textContent = '和面中';
                        updateTimerDisplay();
                        indicatorTimer.classList.remove('idle-timer');
                        btnStart.disabled = true;
                        btnStart.innerHTML = '<span class="btn-icon">⏳</span> 运行中...';
                        btnStop.disabled = false;
                        // 步骤1高亮
                        stepDot1.classList.add('active-kneading');
                        stepLine1.classList.add('active-line');
                        stepLabel1.classList.add('label-active');
                        stepDot2.classList.remove('done', 'active-fermenting');
                        stepDot3.classList.remove('done');
                        stepDot3.classList.add('done');
                        break;

                    case 'fermenting':
                        mainCard.classList.add('state-fermenting');
                        statusBadge.classList.add('fermenting-badge');
                        statusBadge.textContent = '⏳ 发酵中';
                        ringProgress.style.stroke = '#10b981';
                        ringProgress.style.strokeDashoffset = '0';
                        ringProgress.classList.add('pulsing');
                        indicatorIcon.textContent = '🧪';
                        indicatorStateText.textContent = '发酵中';
                        updateTimerDisplay();
                        indicatorTimer.classList.remove('idle-timer');
                        btnStart.disabled = true;
                        btnStart.innerHTML = '<span class="btn-icon">⏳</span> 运行中...';
                        btnStop.disabled = false;
                        // 步骤1完成，步骤2高亮
                        stepDot1.classList.remove('active-kneading');
                        stepDot1.classList.add('done');
                        stepLine1.classList.remove('active-line');
                        stepLine1.classList.add('fermenting-line');
                        stepDot2.classList.add('active-fermenting');
                        stepLabel1.classList.remove('label-active');
                        stepLabel2.classList.add('label-fermenting-active');
                        stepLine2.classList.remove('fermenting-line');
                        stepDot3.classList.remove('done');
                        stepDot3.classList.add('done');
                        break;
                }
            }

            function updateTimerDisplay() {
                if (currentState === 'kneading') {
                    // 和面阶段：往上计数，显示已运行时间
                    const mins = Math.floor(elapsedSeconds / 60);
                    const secs = elapsedSeconds % 60;
                    indicatorTimer.textContent =
                        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                    // 进度环保持spinning动画，不设确定进度
                } else {
                    // 发酵阶段：往下计数
                    const total = currentTotalDuration;
                    const remaining = Math.max(0, total - elapsedSeconds);
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    indicatorTimer.textContent =
                        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

                    // 更新进度环
                    const progress = total > 0 ? (elapsedSeconds / total) : 0;
                    const circumference = 565;
                    const offset = circumference * (1 - progress);
                    ringProgress.style.strokeDashoffset = String(offset);
                }
            }

            // ============ 核心逻辑 ============
            function clearAllTimers() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                if (stateTimeout) {
                    clearTimeout(stateTimeout);
                    stateTimeout = null;
                }
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                }
            }

            async function startKneading() {
                if (currentState !== 'idle') return;

                clearAllTimers();
                stopPolling();
                currentState = 'kneading';
                elapsedSeconds = 0;
                currentTotalDuration = 0; // 和面阶段往上计数
                updateUI();
                soundStateChange();
                vibrate([30, 50, 30]);
                showToast('🔔 和面机开始运转');

                // 发送启动请求到ESP32，调用 motor_coordinated_control()
                try {
                    const data = await apiCall('/api/start', 'POST');
                    if (data.status !== 'ok') {
                        throw new Error('启动失败');
                    }
                } catch (e) {
                    showToast('⚠ 无法连接设备', true);
                    resetToIdle();
                    return;
                }

                // 计时器往上计数，显示已运行时间
                timerInterval = setInterval(() => {
                    elapsedSeconds++;
                    updateTimerDisplay();
                }, 1000);

                // 轮询 /api/status 等待电机协同完成
                startPolling();
            }

            function startFermenting() {
                clearAllTimers();
                currentState = 'fermenting';
                elapsedSeconds = 0;
                currentTotalDuration = FERMENTING_DURATION;
                updateUI();
                soundStateChange();
                vibrate([50, 30, 50]);
                showToast('🫧 进入发酵阶段');

                timerInterval = setInterval(() => {
                    elapsedSeconds++;
                    updateTimerDisplay();
                    if (elapsedSeconds >= FERMENTING_DURATION) {
                        // 发酵完成
                        clearInterval(timerInterval);
                        timerInterval = null;
                        completeProcess();
                    }
                }, 1000);

                stateTimeout = setTimeout(() => {
                    if (currentState === 'fermenting') {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        completeProcess();
                    }
                }, FERMENTING_DURATION * 1000 + 500);
            }

            function completeProcess() {
                clearAllTimers();
                // 短暂显示完成状态
                ringProgress.classList.remove('spinning', 'pulsing');
                ringProgress.style.stroke = '#10b981';
                ringProgress.style.strokeDashoffset = '0';
                indicatorIcon.textContent = '✅';
                indicatorStateText.textContent = '已完成';
                indicatorTimer.textContent = '00:00';
                indicatorTimer.classList.add('idle-timer');
                statusBadge.textContent = '★ 完成';
                statusBadge.classList.remove('kneading-badge', 'fermenting-badge');
                statusBadge.classList.add('fermenting-badge');
                mainCard.classList.remove('state-kneading', 'state-fermenting');
                mainCard.classList.add('state-fermenting');
                btnStart.disabled = true;
                btnStart.innerHTML = '<span class="btn-icon">✅</span> 已完成';
                btnStop.disabled = true;
                // 步骤全部亮起
                [stepDot1, stepDot2, stepDot3].forEach(d => {
                    d.classList.remove('active-kneading', 'active-fermenting', 'done');
                    d.classList.add('active-fermenting');
                });
                [stepLine1, stepLine2].forEach(l => {
                    l.classList.remove('active-line');
                    l.classList.add('fermenting-line');
                });
                [stepLabel1, stepLabel2, stepLabel3].forEach(l => {
                    l.classList.remove('label-active');
                    l.classList.add('label-fermenting-active');
                });

                soundComplete();
                vibrate([100, 50, 100, 50, 200]);
                showToast('🎉 面团处理完成！');

                // 短暂显示完成后回到空闲
                setTimeout(() => {
                    resetToIdle();
                }, 2000);
            }

            async function emergencyStop() {
                if (currentState === 'idle') return;

                clearAllTimers();
                stopPolling();

                // 发送停止请求到ESP32，调用 motor_emergency_stop()
                try {
                    await apiCall('/api/stop', 'POST');
                } catch (e) {
                    // 即使请求失败也继续重置UI
                }

                currentState = 'idle';
                elapsedSeconds = 0;
                currentTotalDuration = 0;
                updateUI();
                soundStop();
                vibrate([200, 80, 200]);
                showToast('🛑 已紧急停止！', true);

                // 重置步骤
                [stepDot1, stepDot2, stepDot3].forEach(d => {
                    d.classList.remove('active-kneading', 'active-fermenting', 'done');
                });
                [stepDot1, stepDot2, stepDot3].forEach(d => d.classList.add('done'));
                [stepLine1, stepLine2].forEach(l => {
                    l.classList.remove('active-line', 'fermenting-line');
                });
                [stepLabel1, stepLabel2, stepLabel3].forEach(l => {
                    l.classList.remove('label-active', 'label-fermenting-active');
                });
            }

            function resetToIdle() {
                clearAllTimers();
                currentState = 'idle';
                elapsedSeconds = 0;
                currentTotalDuration = 0;
                updateUI();
                [stepDot1, stepDot2, stepDot3].forEach(d => {
                    d.classList.remove('active-kneading', 'active-fermenting', 'done');
                });
                [stepDot1, stepDot2, stepDot3].forEach(d => d.classList.add('done'));
                [stepLine1, stepLine2].forEach(l => {
                    l.classList.remove('active-line', 'fermenting-line');
                });
                [stepLabel1, stepLabel2, stepLabel3].forEach(l => {
                    l.classList.remove('label-active', 'label-fermenting-active');
                });
            }

            // ============ 事件监听 ============
            btnStart.addEventListener('click', () => {
                if (currentState === 'idle') {
                    startKneading();
                }
            });

            btnStop.addEventListener('click', () => {
                if (currentState !== 'idle') {
                    emergencyStop();
                }
            });

            // 防止双击缩放
            document.addEventListener('dblclick', function(e) {
                if (e.target.closest('.btn')) {
                    e.preventDefault();
                }
            }, { passive: false });

            // 键盘快捷键（用于测试）
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    if (currentState === 'idle' && document.activeElement === btnStart) {
                        e.preventDefault();
                        startKneading();
                    }
                }
                if (e.key === 'Escape') {
                    if (currentState !== 'idle') {
                        e.preventDefault();
                        emergencyStop();
                    }
                }
            });

            // ============ 初始化 ============
            function init() {
                currentState = 'idle';
                elapsedSeconds = 0;
                currentTotalDuration = 0;
                ringProgress.style.stroke = '#9ca3af';
                ringProgress.style.strokeDashoffset = '0';
                ringProgress.classList.remove('spinning', 'pulsing');
                updateUI();
                [stepDot1, stepDot2, stepDot3].forEach(d => d.classList.add('done'));
                [stepLabel1, stepLabel2, stepLabel3].forEach(l => {
                    l.classList.remove('label-active', 'label-fermenting-active');
                });
                [stepLine1, stepLine2].forEach(l => {
                    l.classList.remove('active-line', 'fermenting-line');
                });
                btnStart.disabled = false;
                btnStart.innerHTML = '<span class="btn-icon">🥖</span> 开始和面';
                btnStop.disabled = true;
                mainCard.classList.remove('state-kneading', 'state-fermenting');
                mainCard.classList.add('state-idle');
            }

            init();

            console.log('🍞 和面机控制面板已就绪');
            console.log('   - 点击"开始和面"调用 motor_coordinated_control()');
            console.log('   - 和面完成后自动进入发酵阶段（10分钟倒计时）');
            console.log('   - 任意时刻点击"紧急停止"调用 motor_emergency_stop()');
            console.log('   - 按 Escape 键也可触发紧急停止');
        })();
    </script>
</body>
</html>
